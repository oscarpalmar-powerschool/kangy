# Frontend (React/TypeScript): run only when frontend/ changed. Build image, push to ECR, deploy to ECS.
# Assumes frontend/Dockerfile builds the app (e.g. multi-stage: node build + nginx serve).
name: Frontend CI / Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_FRONTEND || 'frontend' }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'my-cluster' }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE_FRONTEND || 'frontend-service' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch previous commit if it exists
        run: |
          if [ -n "$PREVIOUS_SHA" ] && [ "$PREVIOUS_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e $PREVIOUS_SHA 2>/dev/null; then
            git fetch --no-tags --depth=100 origin $PREVIOUS_SHA
          else
            echo "No previous commit SHA available - skipping fetch."
          fi
        env:
          PREVIOUS_SHA: ${{ github.event.before }}

      - name: Set base ref for path filter
        id: base
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            git fetch --tags
            PREV=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
            echo "ref=${PREV:-main}" >> $GITHUB_OUTPUT
          else
            # Only use before sha if it is valid and exists in history
            if [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" && $(git cat-file -e ${{ github.event.before }} 2>/dev/null; echo $?) -eq 0 ]]; then
              echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
            else
              echo "ref=main" >> $G
