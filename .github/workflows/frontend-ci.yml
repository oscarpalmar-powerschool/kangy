# Frontend (React/TypeScript): run only when frontend/ changed. Build image, push to ECR, deploy to ECS.
# Assumes frontend/Dockerfile builds the app (e.g. multi-stage: node build + nginx serve).
name: Frontend CI / Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_FRONTEND || 'frontend' }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'my-cluster' }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE_FRONTEND || 'frontend-service' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch previous commit if it exists
        run: |
          if [ -n "$PREVIOUS_SHA" ] && [ "$PREVIOUS_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e $PREVIOUS_SHA 2>/dev/null; then
            git fetch --no-tags --depth=100 origin $PREVIOUS_SHA
          else
            echo "No previous commit SHA available - skipping fetch."
          fi
        env:
          PREVIOUS_SHA: ${{ github.event.before }}

      - name: Set base ref for path filter
        id: base
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            git fetch --tags
            PREV=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
            echo "ref=${PREV:-main}" >> $GITHUB_OUTPUT
          else
            if [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
            else
              echo "ref=main" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check for frontend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
          base: ${{ steps.base.outputs.ref }}

      - name: Configure AWS credentials
        if: steps.filter.outputs.frontend == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.filter.outputs.frontend == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: steps.filter.outputs.frontend == 'true'
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest -f frontend/Dockerfile frontend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to ECS
        if: steps.filter.outputs.frontend == 'true'
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION
