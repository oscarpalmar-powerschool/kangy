# Frontend CI: runs on every push to main or tag when frontend/ files change.
# Build only — no deploy. See frontend-deploy.yml for deployments.
name: Frontend CI

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch previous commit if it exists
        run: |
          if [ -n "$PREVIOUS_SHA" ] && [ "$PREVIOUS_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e $PREVIOUS_SHA 2>/dev/null; then
            git fetch --no-tags --depth=100 origin $PREVIOUS_SHA
          else
            echo "No previous commit SHA available - skipping fetch."
          fi
        env:
          PREVIOUS_SHA: ${{ github.event.before }}

      - name: Set base ref for path filter
        id: base
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            git fetch --tags
            PREV=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
            echo "ref=${PREV:-main}" >> $GITHUB_OUTPUT
          else
            if [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
            else
              echo "ref=main" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check for frontend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
          base: ${{ steps.base.outputs.ref }}

      - name: Set up Node.js
        if: steps.filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true'
        run: npm ci
        working-directory: frontend

      - name: Build
        if: steps.filter.outputs.frontend == 'true'
        run: npm run build
        working-directory: frontend
