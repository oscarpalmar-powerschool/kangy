# kangy backend configuration
server:
  port: 8080

spring:
  application:
    name: kangy-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

kangy:
  security:
    # Secret embedded in ESP32 firmware — must be present in every /register request (X-Registration-Token header).
    device-registration-token: ${DEVICE_REGISTRATION_TOKEN}
    # Secret used by the React frontend — required on all frontend-facing endpoints (X-Api-Key header).
    frontend-api-key: ${FRONTEND_API_KEY}
  images:
    # Directory where XIAO-uploaded images are stored, organised as {root}/{deviceId}/{date}/{timestamp}.jpg
    storage-path: ${IMAGES_STORAGE_PATH:./images}

